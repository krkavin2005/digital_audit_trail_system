<!DOCTYPE html>
<html>
<head>
  <title>Document Upload</title>
</head>
<body>

  <h2>Upload Document</h2>

  <input type="file" id="fileInput" />
  <br><br>
  <button onclick="uploadFile()">Upload</button>

  <p id="result"></p>

  <script>
    async function uploadFile() {

      const fileInput = document.getElementById("fileInput");
      const result = document.getElementById("result");

      if (!fileInput.files.length) {
        result.innerText = "Please select a file.";
        return;
      }

      const file = fileInput.files[0];

      const formData = new FormData();
      formData.append("file", file);

      const token = prompt("Enter your JWT token:");

      try {
        const response = await fetch("http://localhost:3000/documents/upload", {
          method: "POST",
          headers: {
            Authorization: "Bearer " + token
          },
          body: formData
        });

        const data = await response.json();

        if (response.ok) {
          result.style.color = "green";
          result.innerText = "Success: " + data.documentId;
        } else {
          result.style.color = "red";
          result.innerText = "Error: " + data.message;
        }

      } catch (err) {
        result.style.color = "red";
        result.innerText = "Upload failed.";
      }
    }
  </script>

</body>
</html>
